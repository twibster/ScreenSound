name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0) - used only when dispatched manually for testing'
        required: true
        default: '1.0.0'

jobs:
  build:
    name: Build, Package & Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v',''
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $version"

      - name: Restore
        run: dotnet restore AudioMonitorRouter.sln

      - name: Publish single-file self-contained (win-x64)
        # NOTE: PublishReadyToRun is intentionally DISABLED. R2R + SingleFile on
        # WPF crashes with "The type initializer for 'System.Windows.Media.FontFamily'
        # threw an exception" (DirectWrite factory init fails). Known WPF bug —
        # https://github.com/dotnet/wpf/issues/6792
        shell: pwsh
        run: |
          dotnet publish AudioMonitorRouter\AudioMonitorRouter.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o publish

      - name: Rename portable exe with version
        shell: pwsh
        run: |
          Copy-Item `
            -Path "publish\AudioMonitorRouter.exe" `
            -Destination "publish\AudioMonitorRouter-${{ steps.version.outputs.VERSION }}-portable.exe"

      - name: Build installer (Inno Setup)
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\installer.iss

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioMonitorRouter-portable
          path: publish\AudioMonitorRouter-${{ steps.version.outputs.VERSION }}-portable.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioMonitorRouter-installer
          path: installer\Output\*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            publish/AudioMonitorRouter-${{ steps.version.outputs.VERSION }}-portable.exe
            installer/Output/*.exe
