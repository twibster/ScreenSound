name: Release

# Three entry points:
#   1. push of a semver tag (e.g. "git push origin v1.2.0")       — the manual path
#   2. workflow_dispatch                                           — UI button with version input
#   3. workflow_call from auto-release.yml                         — PR-merge driven path
#
# All three converge on the same build matrix. Version is resolved in one place
# (the "Determine version" step) so downstream steps are oblivious to how we got here.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0) - used only when dispatched manually for testing'
        required: true
        default: '1.0.0'
  workflow_call:
    inputs:
      version:
        description: 'Version to release (no "v" prefix)'
        required: true
        type: string

jobs:
  build:
    name: Build, Package & Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          # inputs.version is set by workflow_dispatch AND workflow_call; use it
          # when present. We can't key off github.event_name for the reusable-
          # workflow path: when release.yml is invoked via `uses:` from
          # auto-release.yml, github.event_name in this job is the *caller's*
          # triggering event ("pull_request"), not "workflow_call". Falling
          # back to branch name ("main") meant builds tried `-p:Version=main`
          # and dotnet rejected it as not a valid version string.
          $version = "${{ inputs.version }}"
          if (-not $version) {
            # Tag-push path: strip the leading 'v' from refs/tags/vX.Y.Z.
            $version = "${{ github.ref_name }}" -replace '^v',''
          }
          if (-not $version) {
            Write-Error "Version could not be resolved (event='${{ github.event_name }}', ref='${{ github.ref_name }}', inputs.version='${{ inputs.version }}')"
            exit 1
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $version (event=${{ github.event_name }})"

      - name: Restore
        run: dotnet restore ScreenSound.sln

      - name: Publish framework-dependent (win-x64)
        # Framework-dependent: ~6 MB output vs ~85 MB self-contained. The installer
        # checks for and downloads the .NET 8 Desktop Runtime at install time.
        # Single-file publish is avoided on WPF: R2R + SingleFile crashes
        # DirectWrite factory init — see https://github.com/dotnet/wpf/issues/6792
        shell: pwsh
        run: |
          dotnet publish ScreenSound\ScreenSound.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o publish

      - name: Package portable zip
        shell: pwsh
        run: |
          $zipName = "ScreenSound-${{ steps.version.outputs.VERSION }}-portable.zip"
          Compress-Archive -Path "publish\*" -DestinationPath "publish\$zipName"
          Write-Host "Created $zipName"

      - name: Build installer (Inno Setup)
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\installer.iss

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ScreenSound-portable
          path: publish\ScreenSound-${{ steps.version.outputs.VERSION }}-portable.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ScreenSound-installer
          path: installer\Output\*.exe

      - name: Create GitHub Release
        # Runs on tag push (manual release) and workflow_call (auto-release).
        # Skipped on workflow_dispatch — that entry is for smoke-testing the
        # build matrix without producing a tag/release.
        # softprops/action-gh-release creates the tag at HEAD if not present,
        # which is what the workflow_call path needs (no tag was pushed).
        #
        # We invert the check (!= workflow_dispatch) rather than testing for
        # 'workflow_call' directly because, when invoked from auto-release.yml,
        # github.event_name here is the caller's trigger ('pull_request'), not
        # 'workflow_call'. Only the manual dispatch path needs to skip.
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          # Anchor the tag to the exact commit we just built. Without this,
          # softprops/action-gh-release creates the tag at the default branch
          # HEAD as of release-creation time, which on the workflow_call path
          # can be a later merge than the PR we're releasing for.
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            publish/ScreenSound-${{ steps.version.outputs.VERSION }}-portable.zip
            installer/Output/*.exe
