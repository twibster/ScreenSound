<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Concept 1: Two monitors with a soundwave/arrow arcing between them -->
  <!-- Reads as: audio transferred from one display to another -->

  <!-- Left monitor frame -->
  <rect x="20" y="76" width="92" height="68" rx="8"
        fill="none" stroke="#5A5A5A" stroke-width="10"/>
  <!-- Left stand stem + base -->
  <line x1="66" y1="144" x2="66" y2="160"
        stroke="#5A5A5A" stroke-width="10" stroke-linecap="round"/>
  <line x1="46" y1="164" x2="86" y2="164"
        stroke="#5A5A5A" stroke-width="10" stroke-linecap="round"/>

  <!-- Right monitor frame -->
  <rect x="144" y="76" width="92" height="68" rx="8"
        fill="none" stroke="#5A5A5A" stroke-width="10"/>
  <!-- Right stand stem + base -->
  <line x1="190" y1="144" x2="190" y2="160"
        stroke="#5A5A5A" stroke-width="10" stroke-linecap="round"/>
  <line x1="170" y1="164" x2="210" y2="164"
        stroke="#5A5A5A" stroke-width="10" stroke-linecap="round"/>

  <!-- Transfer arc (audio path) + arrow tip landing on right monitor -->
  <path d="M 112 96 Q 128 16, 144 96
           M 130 80 L 144 96 L 130 110"
        fill="none" stroke="#0078D4" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
