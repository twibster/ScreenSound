<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Concept 2: Single monitor with three soundwaves emanating to the right -->
  <!-- Reads as: display that projects audio -->

  <!-- Monitor frame -->
  <rect x="20" y="60" width="120" height="92" rx="10"
        fill="none" stroke="#5A5A5A" stroke-width="10"/>
  <!-- Stand stem + base -->
  <line x1="80" y1="152" x2="80" y2="172"
        stroke="#5A5A5A" stroke-width="10" stroke-linecap="round"/>
  <line x1="56" y1="176" x2="104" y2="176"
        stroke="#5A5A5A" stroke-width="10" stroke-linecap="round"/>

  <!-- Three expanding soundwave arcs, centered at (140, 106) -->
  <path d="M 156 90 Q 172 106, 156 122"
        fill="none" stroke="#0078D4" stroke-width="10" stroke-linecap="round"/>
  <path d="M 176 72 Q 204 106, 176 140"
        fill="none" stroke="#0078D4" stroke-width="10" stroke-linecap="round"/>
  <path d="M 196 52 Q 236 106, 196 160"
        fill="none" stroke="#0078D4" stroke-width="10" stroke-linecap="round"/>
</svg>
