<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Concept 4a: Concept 4 + a second monitor layered behind. -->
  <!-- Adds a multi-monitor cue without widening the silhouette. -->

  <!-- Back monitor (subtle) -->
  <rect x="52" y="32" width="200" height="120" rx="12"
        fill="none" stroke="#9A9A9A" stroke-width="10"/>

  <!-- Front monitor -->
  <rect x="16" y="56" width="200" height="120" rx="12"
        fill="#FFFFFF" stroke="#5A5A5A" stroke-width="12"/>
  <!-- Stand stem + base (front monitor only) -->
  <line x1="116" y1="176" x2="116" y2="200"
        stroke="#5A5A5A" stroke-width="12" stroke-linecap="round"/>
  <line x1="84" y1="204" x2="148" y2="204"
        stroke="#5A5A5A" stroke-width="12" stroke-linecap="round"/>

  <!-- Speaker glyph inside the front display -->
  <path d="M 68 102 L 92 102 L 120 78 L 120 154 L 92 130 L 68 130 Z"
        fill="#0078D4" stroke="#0078D4" stroke-width="4" stroke-linejoin="round"/>

  <!-- Soundwaves -->
  <path d="M 140 100 Q 156 116, 140 132"
        fill="none" stroke="#0078D4" stroke-width="9" stroke-linecap="round"/>
  <path d="M 158 84 Q 182 116, 158 148"
        fill="none" stroke="#0078D4" stroke-width="9" stroke-linecap="round"/>
</svg>
